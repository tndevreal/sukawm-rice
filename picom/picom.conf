#################################
#          Corners              #
#################################

corner-radius = 12;
detect-rounded-corners = true;

rounded-corners-exclude = [
  "class_g = 'eww-bar'",
  "class_g = 'eww-powermenu'",
  "class_g = 'code-oss'",
  "class_g = 'firefox'",
  "class_g = 'Thunderbird'",
  "_GTK_FRAME_EXTENTS@:c"
];

round-borders = 1;
round-borders-rule = [
  "3:class_g = 'XTerm'",
  "3:class_g = 'URxvt'",
  "15:class_g = 'Signal'"
];

#################################
#           Shadows             #
#################################

shadow = true;
shadow-radius = 12;
shadow-offset-x = -15;
shadow-offset-y = -15;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "_GTK_FRAME_EXTENTS@:c",
  "polybar"
];

#################################
#            Fading             #
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 8;

fade-exclude = [
  "class_g = 'slop'"
];

#################################
#     Transparency / Opacity    #
#################################

inactive-opacity = 0.5;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

opacity-rule = [
  "100:name = 'Dunst'",
  "80:class_g = 'Alacritty'",
  "10:class_g = 'eww-blur_full'",
  "100:class_g = 'Tint2'"
];

focus-exclude = [
  "class_g = 'Cairo-clock'",
  "class_g = 'slop'"
];

#################################
#       Background Blur         #
#################################

blur: {
  method = "dual_kawase";
  strength = 9;
  deviation = 1.0;
  background = false;
  background-frame = false;
  background-fixed = false;
  kern = "3x3box";
}

blur-background-exclude = [
  "class_g = 'dwm'",
  "class_g = 'slop'",
  "_GTK_FRAME_EXTENTS@:c"
];

#################################
#        Sukawm Animations      #
#################################

animations = true;

# Global animation physics
animation-stiffness = 240.0;
animation-dampening = 22.0;
animation-window-mass = 0.35;
animation-clamping = true;

# Animation timings
animation-open-time = 0.2;
animation-close-time = 0.18;
animation-unmap-time = 0.18;
animation-workspace-time = 0.28;

# Window animations
animation-for-open-window = "zoom";
animation-for-close-window = "zoom";
animation-for-unmap-window = "slide-down";

# Workspace animations
animation-for-workspace-switch-in = "slide-up";
animation-for-workspace-switch-out = "slide-down";

#################################
#       Backend Settings        #
#################################

backend = "glx";
vsync = true;

use-damage = true;


xrender-sync-fence = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;

detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;


#################################
#           Logging             #
#################################

log-level = "info";

#################################
#          Window Types         #
#################################

wintypes: {
  normal = { full-shadow = false; };
  tooltip = { fade = true; shadow = false; focus = true; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { full-shadow = true; };
  notification = { opacity = 1; };
}

