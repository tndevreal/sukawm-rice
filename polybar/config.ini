[global/wm]
margin-top = 0
margin-bottom = 0

[settings]
screenchange-reload = true
pseudo-transparency = false

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Base bar template (shared by all pill widgets)
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[bar/base]
width = 180
height = 32
radius = 16
fixed-center = true
override-redirect = true
wm-restack = generic

background = #00000000
foreground = #ECEFF4

font-0 = "JetBrainsMono Nerd Font:size=10;2"

padding-left = 10
padding-right = 10

module-margin = 0
enable-ipc = true

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Individual pill bars
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[bar/audio]
inherit = bar/base
offset-x = 20
offset-y = 5
modules-center = pulseaudio

[bar/time]
inherit = bar/base
offset-x = 45%
offset-y = 5
modules-center = date

[bar/cpu]
inherit = bar/base
offset-x = 90%
offset-y = 5
modules-center = cpu

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;; Modules (each styled as a pill)
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/pulseaudio]
type = internal/pulseaudio
interval = 2

format-volume = <label-volume>
label-volume = VOL %percentage%%

format-volume-background = #81A1C1
format-volume-foreground = #ECEFF4
format-volume-padding = 8
format-volume-radius = 16

[module/date]
type = internal/date
interval = 1
date = %H:%M:%S

format = <label>
label = %date%

format-background = #81A1C1
format-foreground = #ECEFF4
format-padding = 8
format-radius = 16

[module/cpu]
type = internal/cpu
interval = 2

format = <label>
label = CPU %percentage%%

format-background = #81A1C1
format-foreground = #ECEFF4
format-padding = 8
format-radius = 16

